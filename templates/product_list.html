<!DOCTYPE html>
<html>
    <head>
        <title>Shop</title>
    </head>
    <body>
        <h1>Product List</h1>
        {% for product in products %}
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <h2>{{ product.name }}</h2>
                <p>{{ product.description }}</p>
                <strong>KES {{ product.price }}</strong>
                <a href="{{ product.image }}">{{ product.image }}</a>
            </div>
        {% empty %}
            <p>No products available.</p>
        {% endfor %}
    </body>
</html>
