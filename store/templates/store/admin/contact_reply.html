{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<h1>Reply to {{ submission.name }} ({{ submission.email }})</h1>

<p><strong>Subject:</strong> {{ submission.subject }}</p>
<p><strong>Original Message:</strong></p>
<blockquote>{{ submission.message|linebreaks }}</blockquote>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <div style="margin-top: 15px;">
        <button type="submit" class="default">Send Reply</button>
    </div>
</form>


<a href="{% url 'admin:store_contactsubmission_changelist' %}">Back to Submissions</a>
{% endblock %}
