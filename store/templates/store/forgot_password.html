{% extends "base.html" %}
{% block title %}Reset Password | Picktime Consulting{% endblock %}
{% block content %}
<h2 class="text-center">Forgot Password</h2>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label>Email</label>
        {{ form.email }}
    </div>
    <button type="submit" class="btn-primary">Send Temporary Password</button>
</form>
<p class="mt-4"><a href="{% url 'login' %}">Back to Login</a></p>
{% endblock %}
