{% extends "base.html" %}
{% block title %}Login | Picktime Consulting{% endblock %}
{% block content %}
<h2 class="text-center">Login to Your Account</h2>
<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_username">Username</label>
        {{ form.username }}
    </div>
    <div class="form-group">
        <label for="id_password">Password</label>
        {{ form.password }}
    </div>
    <button type="submit" class="btn-primary">Login</button>
</form>

<p class="mt-4"><a href="{% url 'forgot_password' %}">Forgot Password?</a></p>
{% endblock %}
